services:
  yt-hunter:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      signal-cli-rest-api:
        condition: service_started
      ollama:
        condition: service_started

  # Signal CLI REST API — QR-code registration on first run.
  # After starting, visit http://localhost:8080/v1/qrcodelink?device_name=yt-hunter
  # and scan the QR code with your primary Signal app.
  signal-cli-rest-api:
    image: bbernhard/signal-cli-rest-api:latest
    ports:
      - "8080:8080"
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli

  # Ollama — serves the LLM for transcript summarization.
  # Set OPENAI_BASE_URL="http://ollama:11434/v1" and OPENAI_API_KEY="unused" in .env
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  signal-cli-data:
  ollama-data:
